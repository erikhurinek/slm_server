<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="/static/index.css">
</head>

<body>
    <div class="chat-wrapper">
        <div class="header">
            Vibe Chat
            <div class="status-container">
                <div class="user-count">
                    <span id="user-count">0 users online</span>
                </div>
                <div id="busy-indicator" class="busy-indicator">
                    <div class="dot"></div>
                    <span>AI cooking</span>
                </div>
                <div id="ai-status-indicator" class="ai-status-indicator disabled">
                    <span>Responses Disabled</span>
                </div>
            </div>
        </div>
        <div class="messages" id="messages">
            <!-- Chat messages here -->
        </div>
        <form class="input-area">
            <input type="text" id="userInput" placeholder="Say something..." autocomplete="off">
            <div class="submit-container">
                <input type="submit" value="Send" class="button" onclick="event.preventDefault(); sendMessage(true);">
                <div class="dropdown">
                    <button type="button" class="options-button button">⋮</button>
                    <div class="dropdown-content">
                        <a class="dropdown-element" onclick="socket.emit('reset'); return false;">Reset Chat</a>
                        <a class="dropdown-element" id="ai-toggle" onclick="toggleAI(); return false;">Disable
                            Responses</a>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const busyIndicator = document.getElementById('busy-indicator');
        const userCountElement = document.getElementById('user-count');
        const aiToggleElement = document.getElementById('ai-toggle');
        const aiStatusIndicator = document.getElementById('ai-status-indicator');

        // Track the current fetch request so we can abort it if needed
        let currentRequest = null;
        let aiEnabled = true;

        const socket = io.connect(window.location.origin);

        // Receiving messages
        socket.on('update_messages', function (data) {
            data.messages.forEach(message => {
                updateMessage(message);
            });
        });

        // User count event listener
        socket.on('user_count', function (data) {
            userCountElement.textContent = `${data.count} user${data.count == 1 ? "" : "s"} online`;
        });

        // AI busy status event listener
        socket.on('ai_status', function (data) {
            if (data.busy) {
                busyIndicator.classList.add('active');
            } else {
                busyIndicator.classList.remove('active');
            }
        });

        // AI toggle status
        socket.on('ai_toggle_status', function (data) {
            aiEnabled = data.enabled;
            updateAiToggleText();
            updateAiStatusIndicator();
        });

        // AI reset
        socket.on('reset', function () {
            resetChat();
        });

        function parseMarkdown(content) {
            return content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Bold
                .replace(/\*(.*?)\*/g, '<em>$1</em>') // Italics
                .replace(/__(.*?)__/g, '<u>$1</u>') // Underline
        }

        function updateAiToggleText() {
            aiToggleElement.textContent = aiEnabled ? "Disable Response" : "Enable Response";
        }

        function updateAiStatusIndicator() {
            if (aiEnabled) {
                aiStatusIndicator.classList.remove('disabled');
                aiStatusIndicator.style.display = 'none';
            } else {
                aiStatusIndicator.classList.add('disabled');
                aiStatusIndicator.style.display = 'flex';
            }
        }

        function toggleAI() {
            aiEnabled = !aiEnabled;
            socket.emit('toggle_ai', { enabled: aiEnabled });
            updateAiToggleText();
            updateAiStatusIndicator();
        }

        function sendMessage(force) {
            console.log('Sending message:', force);
            const message = document.getElementById('userInput').value.trim();
            if (message.length === 0 && !force) {
                return;
            }

            socket.emit('submit_message', { content: message });
            userInput.value = '';
        }

        // Add or update a message to the chat display
        // message: { id, content, user, append }
        function updateMessage(message) {
            const role = message.role === 'assistant' ? 'bot' : 'user';
            const append = message.append || false;
            let messageContainer = messagesContainer.querySelector(`[data-id='${message.id}']`);
            let messageElement;

            if (!messageContainer) {
                // Create a message container that will hold both username and message content
                messageContainer = document.createElement('div');
                messageContainer.classList.add('message-container');
                messageContainer.setAttribute('data-id', message.id);

                // Create username element
                if (role !== 'bot' && message.user_name) {
                    const usernameElement = document.createElement('div');
                    usernameElement.classList.add('username');
                    usernameElement.classList.add(role + '-username');
                    usernameElement.textContent = message.user_name || (role === 'bot' ? 'AI Assistant' : 'You');
                    messageContainer.appendChild(usernameElement);
                }

                // Create message content element
                messageElement = document.createElement('div');
                messageElement.classList.add('message');
                messageElement.classList.add(role + '-message');
                messageContainer.appendChild(messageElement);

                messagesContainer.appendChild(messageContainer);
            } else {
                messageElement = messageContainer.querySelector('.message');
            }

            if (append) {
                console.log('Appending message:', message);
                messageElement.innerHTML += message.content;
            } else {
                console.log('Updating message:', message);
                messageElement.innerHTML = message.content;
            }

            messageElement.innerHTML = parseMarkdown(messageElement.innerHTML);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Reset the chat
        function resetChat() {
            // Clear the message container
            messagesContainer.innerHTML = '';
            currentMessageId = -1;
        }

        // Event listener for Enter key
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize the toggle button text
        updateAiToggleText();
        updateAiStatusIndicator();
    </script>
</body>

</html>
