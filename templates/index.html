<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to right, #f5f7fa, #c3cfe2);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-wrapper {
            width: 95%;
            max-width: 1000px;
            height: 92vh;
            background: #ffffff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            padding: 24px;
            text-align: center;
            font-size: 1.75rem;
            font-weight: 600;
            background: #f0f4f8;
            border-bottom: 2px solid #e0e0e0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #f9f9fb;
        }

        .message {
            padding: 14px 20px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
            font-size: 1rem;
        }

        .user-message {
            background: #4f8ef7;
            color: #fff;
            align-self: flex-end;
        }

        .bot-message {
            background: #e2e8f0;
            color: #111;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 20px 24px;
            gap: 12px;
            background: #f0f4f8;
            border-top: 2px solid #e0e0e0;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid #ccc;
            background: #fff;
            color: #333;
            font-size: 1rem;
        }

        .input-area input[type="submit"] {
            border-radius: 12px 0 0 12px;
            padding: 0 20px;
        }

        .button {
            background: #4f8ef7;
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button:hover {
            background: #336ac0;
        }

        .options-button {
            border-radius: 0 12px 12px 0;
            padding: 0 14px;
            margin: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            bottom: 100%;
            right: 0;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 8px;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
            border-radius: 8px;
        }

        .submit-container {
            display: flex;
            align-items: stretch;
            height: 48px;
        }
    </style>
</head>

<body>
    <div class="chat-wrapper">
        <div class="header">Vibe Chat</div>
        <div class="messages" id="messages">
            <!-- Chat messages here -->
        </div>
        <form class="input-area">
            <input type="text" id="userInput" placeholder="Say something..." autocomplete="off">
            <div class="submit-container">
                <input type="submit" value="Send" class="button" onclick="event.preventDefault(); sendMessage();">
                <div class="dropdown">
                    <button type="button" class="options-button button">⋮</button>
                    <div class="dropdown-content">
                        <a href="#" onclick="resetChat(); return false;">Reset Chat</a>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');

        function sendMessage() {
            const userInput = document.getElementById('userInput');
            const messageText = userInput.value.trim();

            if (messageText) {
                addMessage(messageText, 'user-message');

                fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: messageText })
                }).then(response => {
                    if (response.ok) {
                        const reader = response.body.getReader();
                        let botMessage = '';
                        const botMessageElement = addMessage('', 'bot-message');

                        function readStream() {
                            reader.read().then(({ done, value }) => {
                                if (done) return;
                                const chunk = new TextDecoder().decode(value);
                                botMessage += chunk;
                                botMessageElement.textContent = botMessage;
                                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                readStream();
                            });
                        }

                        readStream();
                    } else {
                        addMessage('Error: Unable to connect to the server.', 'bot-message');
                    }
                }).catch(() => {
                    addMessage('Error: Unable to connect to the server.', 'bot-message');
                });

                userInput.value = '';
            }
        }

        function addMessage(text, className) {
            const message = document.createElement('div');
            message.className = `message ${className}`;
            message.textContent = text;
            messagesContainer.appendChild(message);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return message;
        }

        function resetChat() {
            fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    messagesContainer.innerHTML = '';
                    addMessage('Model has been reset.', 'bot-message');
                } else {
                    addMessage('Error: Unable to reset chat.', 'bot-message');
                }
            }).catch(() => {
                addMessage('Error: Unable to reset chat.', 'bot-message');
            });
        }
    </script>
</body>

</html>
